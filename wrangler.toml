name = "apollon"
main = "src/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/5 * * * *"]

# Serves frontend/ directly from this Worker (no separate Pages project).
# Requests matching a real file in frontend/ are served directly; anything
# else (including all /api/* routes) falls through to src/worker.js, which
# handles /api/* itself and proxies everything else to ASSETS/index.html
# (see the fetch handler in src/worker.js).
[assets]
directory = "./frontend"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "wid-db"
database_id = "2d360f65-466a-43a4-bfd6-b54ae9b11306"

[[vectorize]]
binding = "VECTORIZE"
index_name = "wid-articles"

[vars]
ENVIRONMENT = "production"
ADMIN_EMAIL = "kkourentzes@gmail.com"

# Secrets — set via: wrangler secret put SECRET_NAME
# OPENAI_API_KEY
# GOOGLE_CLIENT_ID
# JWT_SECRET
# VAPID_PUBLIC_KEY
# VAPID_PRIVATE_KEY
