name = "apollon"
main = "src/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/30 * * * *"]

# Serves frontend/ directly from this Worker (no separate Pages project).
# API routes still run through src/worker.js; everything else is served as
# a static file, falling back to index.html for unmatched paths.
[assets]
directory = "./frontend"
binding = "ASSETS"
run_worker_first = ["/api/*"]
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "wid-db"
database_id = "2d360f65-466a-43a4-bfd6-b54ae9b11306"

[[vectorize]]
binding = "VECTORIZE"
index_name = "wid-articles"

[vars]
ENVIRONMENT = "production"
ADMIN_EMAIL = "kkourentzes@gmail.com"

# Secrets — set via: wrangler secret put SECRET_NAME
# OPENAI_API_KEY
# GOOGLE_CLIENT_ID
# JWT_SECRET
# VAPID_PUBLIC_KEY
# VAPID_PRIVATE_KEY
