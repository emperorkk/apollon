<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apollon — Admin</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">&#9670;</span>
        <span class="brand-name">APOLLON</span>
        <span class="brand-sub">Admin Console</span>
      </div>
      <div class="header-actions" style="margin-left:auto;">
        <a href="/index.html" class="btn-ghost">&larr; DASHBOARD</a>
        <button type="button" class="btn-ghost" id="admin-refresh">REFRESH</button>
      </div>
    </header>

    <main class="admin-main" id="admin-main"></main>
  </div>

  <dialog id="topic-dialog">
    <form method="dialog" id="topic-form">
      <div class="admin-section-title" style="margin-bottom:14px;">Topic</div>
      <input type="hidden" name="id" />
      <div class="form-field"><label>Name</label><input name="name" required /></div>
      <div class="form-field"><label>Greek Label</label><input name="name_gr" /></div>
      <div class="form-field"><label>Keywords (comma-separated)</label><input name="keywords" /></div>
      <div class="form-field"><label>Colour</label><input name="color_hex" type="color" required /></div>
      <div class="form-field">
        <label>Trigger Level (1-5)</label>
        <input name="trigger_level" type="number" min="1" max="5" value="3" required />
      </div>
      <div class="form-field">
        <label>Active</label>
        <select name="active"><option value="1">Active</option><option value="0">Inactive</option></select>
      </div>
      <div class="dialog-actions">
        <button type="button" class="btn-ghost" id="topic-cancel">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="source-dialog">
    <form method="dialog" id="source-form">
      <div class="admin-section-title" style="margin-bottom:14px;">Source</div>
      <input type="hidden" name="id" />
      <div class="form-field"><label>Name</label><input name="name" required /></div>
      <div class="form-field"><label>RSS URL</label><input name="rss_url" type="url" required /></div>
      <div class="form-field"><label>Region (ISO 3166-1 alpha-2)</label><input name="region" maxlength="3" required /></div>
      <div class="form-field"><label>Language (ISO 639-1)</label><input name="language" maxlength="2" required /></div>
      <div class="form-field"><label>Category Bias</label><input name="category_bias" /></div>
      <div class="form-field">
        <label>Active</label>
        <select name="active"><option value="1">Active</option><option value="0">Inactive</option></select>
      </div>
      <div class="dialog-actions">
        <button type="button" class="btn-ghost" id="source-cancel">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>
