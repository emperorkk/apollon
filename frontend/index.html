<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apollon — World Intelligence Dashboard</title>
  <meta name="description" content="Real-time global news aggregation and geopolitical intelligence dashboard." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2213%22 font-size=%2214%22>◆</text></svg>" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/map.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">&#9670;</span>
        <span class="brand-name">APOLLON</span>
        <span class="brand-sub">World Intelligence Dashboard</span>
      </div>

      <nav class="topic-filters" id="topic-filters" aria-label="Topic filters"></nav>

      <div class="search-wrap">
        <input type="search" id="search-input" placeholder="SEARCH INTEL&hellip;" autocomplete="off" />
      </div>

      <div class="header-actions">
        <button id="push-toggle" class="btn-ghost" type="button" hidden>NOTIFY</button>
        <div id="auth-area" class="auth-area"></div>
        <a href="/admin.html" id="admin-link" class="btn-ghost" hidden>ADMIN</a>
      </div>
    </header>

    <main class="app-main">
      <section class="map-panel">
        <div id="map"></div>
        <div class="map-controls">
          <span class="map-legend" id="map-legend"></span>
          <label class="days-control" for="days-slider">
            <span>WINDOW</span>
            <input type="range" id="days-slider" min="1" max="30" value="5" />
            <span class="days-value"><span id="days-value">5</span>D</span>
          </label>
        </div>
      </section>

      <section class="feed-panel">
        <div class="feed-toolbar">
          <div class="feed-count" id="feed-count">&mdash;</div>
          <select id="region-filter" class="region-select">
            <option value="">ALL REGIONS</option>
          </select>
        </div>
        <div class="feed-list" id="feed-list"></div>
        <div class="feed-sentinel" id="feed-sentinel"></div>
      </section>
    </main>

    <div class="scrim" id="scrim"></div>

    <aside class="article-card" id="article-card" aria-hidden="true">
      <button class="card-close" id="card-close" type="button" aria-label="Close">&times;</button>
      <div class="card-body" id="card-body"></div>
    </aside>

    <div class="graph-modal" id="graph-modal" aria-hidden="true">
      <button class="graph-close" id="graph-close" type="button">&times; CLOSE</button>
      <div id="graph-container"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/cytoscape@3.30.0/dist/cytoscape.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
